<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duxre — Revenue Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f0ee;--surface:#fff;--surface2:#f7f7f6;
  --nav:#282828;--border:#e2e2df;--border-dark:#d0d0cc;
  --red:#EE3135;--red-light:#fff0f2;--red-border:#fcc;
  --amber:#b45309;--amber-light:#fffbeb;--amber-border:#fde68a;
  --green:#166534;--green-light:#f0fdf4;--green-border:#bbf7d0;
  --blue:#1d4ed8;--blue-light:#eff6ff;--blue-border:#bfdbfe;
  --text:#111;--text2:#555;--text3:#999;
  --ff:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{background:var(--bg);font-family:var(--ff);color:var(--text);font-size:13px;line-height:1.5}
a{text-decoration:none;color:inherit}
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--nav);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.logo-area{padding:18px 20px 16px;border-bottom:1px solid #222}
.logo-area img{height:24px;display:block;filter:brightness(0) invert(1)}
.nav-group{padding:16px 12px 4px;font-size:10px;font-weight:700;letter-spacing:.12em;color:#444;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;margin:1px 8px;border-radius:6px;color:#9a9a9a;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:#1a1a1a;color:#ddd}
.nav-item.active{background:#fff!important;color:#111!important}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:.5;transition:opacity .15s}
.nav-item:hover svg{opacity:.8}
.nav-item.active svg{opacity:1}
.nav-tag{font-size:9px;font-weight:800;padding:1px 6px;background:var(--red);color:#fff;border-radius:3px;margin-left:auto;flex-shrink:0}
.nav-tag.green{background:#166534}.nav-tag.amber{background:#b45309}
.sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid #1f1f1f}
.user-chip{display:flex;align-items:center;gap:9px;padding:9px 10px;background:#1a1a1a;border-radius:6px}
.user-av{width:28px;height:28px;border-radius:5px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.user-name{font-size:12px;font-weight:700;color:#ddd}
.user-role{font-size:10px;color:#555;margin-top:1px}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;height:54px;gap:14px;position:sticky;top:0;z-index:20;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.topbar-title{font-size:15px;font-weight:800;color:var(--text);flex:1;letter-spacing:-.3px}
.topbar-meta{font-size:11px;color:var(--text3);font-weight:600}
.topbar-pill{font-size:10px;font-weight:700;letter-spacing:.06em;padding:4px 10px;border-radius:20px;background:var(--green-light);color:var(--green);border:1px solid var(--green-border);text-transform:uppercase}
.hero-strip{display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border-bottom:2px solid var(--border)}
.hero-kpi{padding:20px 22px;border-right:1px solid var(--border);position:relative}
.hero-kpi:last-child{border-right:none}
.hk-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.hk-value{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1;color:var(--text);letter-spacing:-.02em}
.hk-sub{font-size:11px;color:var(--text3);margin-top:5px;font-weight:600}
.hk-bar{position:absolute;bottom:0;left:0;right:0;height:3px}
.sec-band{background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:10px;margin-top:8px}
.sec-num{width:22px;height:22px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.sec-title{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text);flex:1}
.sec-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.inner{padding:18px 28px 6px}
.mg4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.mg3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.mc{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px;border-top:3px solid var(--border-dark)}
.mc.accent{border-top-color:var(--red)}.mc.green{border-top-color:var(--green)}.mc.amber{border-top-color:var(--amber)}.mc.blue{border-top-color:#0a66c2}
.mc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px}
.mc-value{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--text);line-height:1}
.mc-sub{font-size:11px;color:var(--text3);margin-top:5px;font-weight:600}
.panel{background:#fff;border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:14px}
.panel.flag-red{border-left:4px solid var(--red)}.panel.flag-amber{border-left:4px solid #d97706}.panel.flag-green{border-left:4px solid #16a34a}.panel.flag-blue{border-left:4px solid #0a66c2}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.three-col{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:14px;margin-bottom:14px}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.panel-title{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.2px}
.panel-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);border-bottom:2px solid var(--border);background:var(--surface2)}
.tbl td{padding:9px 12px;color:var(--text2);border-bottom:1px solid var(--border);vertical-align:middle;line-height:1.4}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafaf9}
.tbl td.em{color:var(--text);font-weight:700}
.b{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;display:inline-block;letter-spacing:.03em}
.b-red{background:var(--red-light);color:var(--red);border:1px solid var(--red-border)}
.b-green{background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}
.b-amber{background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-border)}
.b-blue{background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-border)}
.b-gray{background:#f5f5f3;color:#666;border:1px solid var(--border-dark)}
.b-dark{background:#111;color:#fff}
.b-li{background:#0a66c2;color:#fff}
.b-new{background:#7c3aed;color:#fff}
.sr{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.sr:last-child{border-bottom:none}
.sr-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px}
.s-done{background:var(--green-light);color:var(--green)}.s-warn{background:var(--amber-light);color:var(--amber)}.s-crit{background:var(--red-light);color:var(--red)}
.sr-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px}
.sr-sub{font-size:11px;color:var(--text3);line-height:1.6}
.br{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.br:last-child{border-bottom:none}
.br-lbl{font-size:11px;color:var(--text2);width:190px;flex-shrink:0;font-weight:600;line-height:1.4}
.br-track{flex:1;background:#eee;border-radius:3px;height:7px;overflow:hidden}
.br-fill{height:7px;border-radius:3px}
.br-val{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);width:42px;text-align:right;flex-shrink:0}
.jira-bug{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.jira-bug:last-child{border-bottom:none}
.jira-ticket{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--red);flex-shrink:0;width:72px}
.jira-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.jira-sub{font-size:11px;color:var(--text3);line-height:1.5}
.alert{border-radius:7px;padding:11px 14px;font-size:12px;line-height:1.7;font-weight:600;margin-bottom:14px}
.alert-red{background:var(--red-light);border:1px solid var(--red-border);color:var(--red)}
.alert-green{background:var(--green-light);border:1px solid var(--green-border);color:var(--green)}
.alert-amber{background:var(--amber-light);border:1px solid var(--amber-border);color:var(--amber)}
.alert-blue{background:var(--blue-light);border:1px solid var(--blue-border);color:var(--blue)}
.creative-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.creative-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.creative-thumb{height:80px;display:flex;align-items:center;justify-content:center;padding:10px;position:relative}
.creative-badge{position:absolute;top:6px;left:6px;background:rgba(255,255,255,.18);border-radius:3px;font-size:8px;font-weight:700;color:#fff;padding:2px 5px}
.creative-headline{font-size:10px;font-weight:700;color:#fff;text-align:center;line-height:1.4}
.creative-stats{padding:8px}
.creative-camp{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:5px}
.creative-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.team-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px}
.tm-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.tm-row:last-child{border-bottom:none}
.tm-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0}
.tm-super{background:#111;color:#fff}.tm-admin{background:var(--surface2);color:var(--text2);border:1px solid var(--border-dark)}
.footer-band{background:var(--nav);padding:16px 28px;text-align:center;margin-top:8px}
.footer-band p{font-size:11px;color:#555;line-height:2}
.footer-band p span{color:var(--red);font-weight:700}
.ikv{padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;line-height:1.7;color:var(--text2)}
.ikv:last-child{border-bottom:none}
.ikv strong{font-weight:800;color:var(--text)}
.chart-wrap{position:relative;width:100%;height:180px;margin-top:8px}
.chart-wrap.sm{height:145px}.chart-wrap.lg{height:220px}
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-size:11px;color:var(--text3);font-weight:600}
.leg span{display:flex;align-items:center;gap:5px}
.leg-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.ga4-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.ga4-row:last-child{border-bottom:none}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-live{background:#16a34a}.dot-warn{background:#d97706}
.ga4-name{font-weight:600;color:var(--text)}
.ga4-id{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:auto}
.qcats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.qcat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.qcat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px}
.qcat-pts{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--text)}
.grade-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.gp{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid}
.gp-a{background:var(--green-light);color:var(--green);border-color:var(--green-border)}
.gp-b{background:var(--blue-light);color:var(--blue);border-color:var(--blue-border)}
.gp-c{background:var(--amber-light);color:var(--amber);border-color:var(--amber-border)}
.gp-d{background:var(--red-light);color:var(--red);border-color:var(--red-border)}
.cac-table{width:100%;font-size:12px}
.cac-table tr{border-bottom:1px solid var(--border)}
.cac-table tr:last-child{border-bottom:none}
.cac-table td{padding:7px 0;color:var(--text2);font-weight:600}
.cac-table td:last-child{text-align:right;font-family:var(--mono);font-weight:600;color:var(--text)}
@media(max-width:960px){.sidebar{display:none}.hero-strip,.mg4{grid-template-columns:repeat(2,1fr)}.two-col,.three-col{grid-template-columns:1fr}.creative-grid{grid-template-columns:repeat(2,1fr)}}
</style>
<script>
function navTo(id,btn){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
  var el=document.getElementById(id);
  if(el){el.scrollIntoView({behavior:'smooth',block:'start'});}
}
function pBadge(p){
  var styles={
    hot:'display:inline-flex;align-items:center;gap:4px;background:#fde8e8;color:#EE3135;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.02em',
    warm:'display:inline-flex;align-items:center;gap:4px;background:#f0f0f0;color:#4C4C4E;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.02em',
    closed:'display:inline-flex;align-items:center;gap:4px;background:#282828;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.02em'
  };
  var icons={hot:'<svg width="9" height="9" viewBox="0 0 24 24" fill="#EE3135"><path d="M13 2L4.09 12.97H11L10 22L19.91 11.03H13L13 2Z"/></svg>',warm:'<svg width="9" height="9" viewBox="0 0 24 24" fill="#4C4C4E"><circle cx="12" cy="12" r="6"/></svg>',closed:'<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'};
  var labels={hot:'Hot',warm:'Warm',closed:'Closed'};
  return '<span style="'+styles[p]+'">'+(icons[p]||'')+labels[p]+'</span>';
}
function render(){
  var D=window.DUXRE;
  if(!D){setTimeout(render,50);return;}
  document.title='Duxre — '+D.meta.title;
  var main=document.getElementById('main-content');
  main.innerHTML=buildPage(D);
  loadCharts(D);
}
function buildPage(D){
  return buildTopbar(D)+buildHero(D)+buildS1(D)+buildS2(D)+buildS3(D)+buildS4(D)+buildS5(D)+buildS6(D)+buildECE(D)+buildOutreach(D)+buildLinkedIn(D)+buildGoogleAds(D)+buildMeta(D)+buildFooter(D);
}
function buildTopbar(D){
  return '<div class="topbar"><div class="topbar-title">Revenue Operations — '+D.meta.period+'</div><span class="topbar-meta">MTD · Updated '+D.meta.updated+'</span><span class="topbar-pill">Live</span></div>';
}
function buildHero(D){
  var h=D.hero;
  var tiles=h.map(function(t){
    var bar=t.goal?'<div style="margin-top:4px;background:#BFBEBF;border-radius:4px;height:6px;width:100%"><div style="background:'+t.color+';height:6px;border-radius:4px;width:'+Math.round(parseInt(t.value)/t.goal*100)+'%"></div></div><span style="font-size:10px;color:#636466;margin-top:3px;display:block">'+Math.round(parseInt(t.value)/t.goal*100)+'% to goal</span>':'';
    if(t.label==='Power Brokers'){bar='<div style="margin-top:4px;background:#BFBEBF;border-radius:4px;height:6px;width:100%"><div style="background:'+t.color+';height:6px;border-radius:4px;width:66%"></div></div><span style="font-size:10px;color:#636466;margin-top:3px;display:block">'+t.sub+'</span>';}
    var valStr=t.goal&&t.label!=='Power Brokers'?t.value+' <span style="font-size:14px;color:#636466">/ '+t.goal+'</span>':t.value;
    return '<div class="hero-kpi" style="border-top:3px solid '+t.color+'"><div class="hk-label">'+t.label+'</div><div class="hk-value" style="color:'+t.color+'">'+valStr+'</div><div class="hk-sub">'+(t.label==='Power Brokers'?bar:t.sub+bar)+'</div><div class="hk-bar" style="background:'+t.color+'"></div></div>';
  }).join('');
  return '<div class="hero-strip">'+tiles+'</div>';
}
function buildS1(D){
  var rows=D.s1_targets.map(function(t){
    var bg=t.priority==='hot'?'background:#fef6f6':t.priority==='closed'?'background:#f5f5f5':'background:#fafafa';
    return '<tr style="'+bg+'"><td class="em">'+t.name+'</td><td>'+t.company+'</td><td>'+pBadge(t.priority)+'</td><td>'+t.owner+'</td><td>'+t.status+'</td><td class="em" style="color:'+(t.priority==='hot'?'#EE3135':'#282828')+'">'+t.date+'</td></tr>';
  }).join('');
  var srcCards=D.s1_leadSources.map(function(s){
    return '<div style="border:1px solid #e5e5e5;border-left:3px solid '+s.color+';border-radius:6px;padding:12px 14px"><div style="font-size:10px;font-weight:700;color:#636466;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px">'+s.label+'</div><div style="font-size:28px;font-weight:800;color:'+s.color+';line-height:1">'+s.count.toLocaleString()+'</div><div style="margin-top:8px;background:#BFBEBF;border-radius:3px;height:4px"><div style="background:'+s.color+';height:4px;border-radius:3px;width:'+s.pct+'%"></div></div><div style="font-size:10px;color:#636466;margin-top:4px">'+s.pct+'% of total contacts</div></div>';
  }).join('');
  return '<div id="s1" class="sec-band"><div class="sec-num">1</div><div class="sec-title">Sales Overview</div><span class="sec-pill b-gray">Apr 1–12 · HubSpot Live</span></div><div class="inner"><div class="panel flag-red"><div class="panel-hdr"><div class="panel-title">🎯 Priority Targets — April 2026</div><span class="b b-gray">HubSpot + Slack · Live · Apr 13</span></div><table class="tbl"><thead><tr><th style="width:14%">Name</th><th style="width:18%">Company</th><th style="width:10%">Priority</th><th style="width:8%">Owner</th><th style="width:38%">Status / Next Action</th><th style="width:12%">Date</th></tr></thead><tbody>'+rows+'</tbody></table></div><div class="panel"><div class="panel-hdr"><div class="panel-title">Lead Source Breakdown</div><span class="b" style="background:#282828;color:#fff">1,362 Contacts · Apr MTD</span></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">'+srcCards+'</div></div></div>';
}
function buildS2(D){
  var kpis=D.s2_ga4.kpis.map(function(k){return '<div class="mc" style="border-top-color:'+k.color+'"><div class="mc-label">'+k.label+'</div><div class="mc-value" style="color:'+k.color+'">'+k.value+'</div><div class="mc-sub">'+k.sub+'</div></div>';}).join('');
  var chRows=D.s2_ga4.byChannel.map(function(c){return '<div class="br"><div class="br-lbl">'+c.label+'</div><div class="br-track"><div class="br-fill" style="width:'+c.pct+'%;background:'+(c.label==='Organic Search'?'#EE3135':c.label==='Direct'?'#282828':c.label==='LinkedIn'?'#EE3135':'#4C4C4E')+'"></div></div><div class="br-val">'+c.value+(c.badge?' '+c.badge:'')+'</div></div>';}).join('');
  var cityRows=D.s2_ga4.byCity.map(function(c){return '<div class="br"><div class="br-lbl" '+(c.warn?'style="color:var(--amber)"':'')+'>'+c.label+(c.note?'':'')+' </div><div class="br-track"><div class="br-fill" style="width:'+Math.round(c.value/430*100)+'%;background:#282828"></div></div><div class="br-val">'+c.value+'</div></div>';}).join('');
  var retRows=D.s2_ga4.retention.map(function(r){return '<div class="br"><div class="br-lbl">'+r.label+'</div><div class="br-track"><div class="br-fill" style="width:'+r.pct+'%;background:'+(r.pct===100?'#282828':'#EE3135')+'"></div></div><div class="br-val">'+r.pct+'%</div></div>';}).join('');
